<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Daily study</title>
    <link rel="stylesheet" href="../css/login.css">
</head>
<body class="login-page">
    <div class="login-container">
        <h1>Daily study</h1>
        <h2>Acesso ao Sistema</h2>
        
        <form id="loginForm">
            <input type="email" id="email" placeholder="E-mail" required>
            <input type="password" id="senha" placeholder="Senha" required>
            <button type="submit" id="btn-login" class="submit-button">Entrar</button>
            <p id="mensagemErro" class="error-message"></p>
        </form>
        <p style="margin-top: 15px; font-size: 0.9rem; color: #ccc;">
            Não tem conta? <a href="registro.html" style="color: var(--marrom-claro); text-decoration: none;">Crie uma aqui</a>
        </p>
    </div>

    <script src="../js/login.js"></script>


    
 

</html>
