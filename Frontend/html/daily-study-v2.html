<!-- ══════════════════════════════════════════════════════════
     SCRIPTS — carregados ao final do body para não bloquear render.
     Ordem de carregamento OBRIGATÓRIA (cada módulo depende do anterior):
       storage.js  →  profile.js  →  posts.js  →  ui.js  →  app.js
══════════════════════════════════════════════════════════ -->







<script>
/**
 * ╔══════════════════════════════════════════════════════════════╗
 * ║  storage.js — Camada de Persistência (localStorage)         ║
 * ║                                                              ║
 * ║  Toda leitura e escrita no localStorage fica centralizada   ║
 * ║  aqui. Os outros módulos NUNCA acessam localStorage         ║
 * ║  diretamente — usam sempre este módulo.                      ║
 * ║                                                              ║
 * ║  Isso facilita trocar por uma API real no futuro:            ║
 * ║  basta alterar apenas este arquivo.                          ║
 * ║                                                              ║
 * ║  ATENÇÃO SOBRE IMAGENS:                                      ║
 * ║  Imagens são salvas como Data URLs (Base64).                 ║
 * ║  Isso funciona para imagens pequenas/médias,                 ║
 * ║  mas o localStorage tem limite de ~5MB por origem.           ║
 * ║  Para produção, use um servidor ou IndexedDB.                ║
 * ╚══════════════════════════════════════════════════════════════╝
 *
 * @module Storage
 * @exports {Object} Storage — API pública com métodos para posts e perfil
 */

const Storage = (() => {

  // ─────────────────────────────────────────────
  // CHAVES DO localStorage
  // Centralizar aqui evita erros de typo
  // ─────────────────────────────────────────────
  const KEYS = {
    POSTS:   'ds_posts',    // Array de objetos de post
    PROFILE: 'ds_profile',  // Objeto com dados do perfil
  };


  // ═══════════════════════════════════════════
  // MÉTODOS DE POSTS
  // ═══════════════════════════════════════════

  /**
   * Retorna todos os posts salvos, ordenados do mais novo para o mais antigo.
   * (A ordem cronológica decrescente é mantida pois cada novo post é inserido
   *  no início do array com unshift.)
   *
   * @returns {Array<PostObject>} Array de posts (pode ser vazio)
   *
   * @typedef  {Object}  PostObject
   * @property {string}  id         UUID único do post
   * @property {string}  text       Texto do post
   * @property {string|null} image  Data URL da imagem ou null
   * @property {string}  createdAt  ISO 8601 da criação
   * @property {string|null} editedAt ISO 8601 da última edição ou null
   */
  function getPosts() {
    try {
      const raw = localStorage.getItem(KEYS.POSTS);
      return raw ? JSON.parse(raw) : [];
    } catch (err) {
      // Se o JSON estiver corrompido, retorna array vazio
      console.error('[Storage] Erro ao ler posts:', err);
      return [];
    }
  }

  /**
   * Substitui o array inteiro de posts no localStorage.
   * Uso interno — os consumidores usam addPost / editPost / deletePost.
   *
   * @param {Array<PostObject>} posts
   */
  function savePosts(posts) {
    try {
      localStorage.setItem(KEYS.POSTS, JSON.stringify(posts));
    } catch (err) {
      // Pode acontecer se localStorage estiver cheio (quota exceeded)
      console.error('[Storage] Erro ao salvar posts:', err);
      throw new Error('Armazenamento cheio. Exclua alguns posts com imagens.');
    }
  }

  /**
   * Cria um novo post, insere no início do array (ordem desc)
   * e salva no localStorage.
   *
   * @param {string}      text           Texto da postagem (obrigatório)
   * @param {string|null} imageDataUrl   Data URL da imagem ou null
   * @returns {PostObject} O post recém-criado
   */
  function addPost(text, imageDataUrl = null) {
    const posts = getPosts();

    const post = {
      id:        crypto.randomUUID(),  // ID único nativo do browser
      text:      text.trim(),
      image:     imageDataUrl,         // Base64 ou null
      createdAt: new Date().toISOString(),
      editedAt:  null,
    };

    // unshift() insere no início → mais novo fica primeiro
    posts.unshift(post);
    savePosts(posts);

    return post;
  }

  /**
   * Atualiza o texto de um post existente pelo seu ID.
   * Registra a data/hora da edição em editedAt.
   *
   * @param {string} id       ID do post a editar
   * @param {string} newText  Novo texto
   * @returns {PostObject|null} Post atualizado ou null se não encontrado
   */
  function editPost(id, newText) {
    const posts = getPosts();
    const index = posts.findIndex(p => p.id === id);

    if (index === -1) {
      console.warn('[Storage] editPost: post não encontrado:', id);
      return null;
    }

    posts[index].text     = newText.trim();
    posts[index].editedAt = new Date().toISOString();

    savePosts(posts);
    return posts[index];
  }

  /**
   * Remove um post pelo ID.
   *
   * @param {string} id  ID do post a excluir
   */
  function deletePost(id) {
    const posts    = getPosts();
    const filtered = posts.filter(p => p.id !== id);
    savePosts(filtered);
  }


  // ═══════════════════════════════════════════
  // MÉTODOS DE PERFIL
  // ═══════════════════════════════════════════

  /**
   * Perfil padrão exibido na primeira execução.
   * @type {ProfileObject}
   */
  const DEFAULT_PROFILE = {
    name:        'João da Silva',
    bio:         'Apaixonado por aprender. Sempre estudando algo novo a cada dia.',
    avatarUrl:   null,   // Data URL da foto de perfil
    bannerUrl:   null,   // Data URL do banner
  };

  /**
   * Retorna o perfil do usuário salvo.
   * Se não houver perfil salvo, retorna o perfil padrão.
   *
   * @returns {ProfileObject}
   *
   * @typedef  {Object}      ProfileObject
   * @property {string}      name       Nome do usuário
   * @property {string}      bio        Biografia
   * @property {string|null} avatarUrl  Data URL do avatar ou null
   * @property {string|null} bannerUrl  Data URL do banner ou null
   */
  function getProfile() {
    try {
      const raw = localStorage.getItem(KEYS.PROFILE);
      // Mescla com DEFAULT_PROFILE para garantir que novas propriedades
      // adicionadas no futuro tenham valor padrão em perfis antigos
      return raw ? { ...DEFAULT_PROFILE, ...JSON.parse(raw) } : { ...DEFAULT_PROFILE };
    } catch (err) {
      console.error('[Storage] Erro ao ler perfil:', err);
      return { ...DEFAULT_PROFILE };
    }
  }

  /**
   * Salva (substitui) o perfil do usuário.
   *
   * @param {ProfileObject} profile  Objeto com os dados do perfil
   */
  function saveProfile(profile) {
    try {
      localStorage.setItem(KEYS.PROFILE, JSON.stringify(profile));
    } catch (err) {
      console.error('[Storage] Erro ao salvar perfil:', err);
      throw new Error('Armazenamento cheio. A imagem pode ser muito grande.');
    }
  }

  /**
   * Atualiza parcialmente o perfil (merge com o existente).
   * Útil para atualizar apenas o avatar sem mexer no nome/bio, etc.
   *
   * @param {Partial<ProfileObject>} partial  Campos a atualizar
   * @returns {ProfileObject} Perfil completo após atualização
   */
  function patchProfile(partial) {
    const current = getProfile();
    const updated = { ...current, ...partial };
    saveProfile(updated);
    return updated;
  }


  // ─────────────────────────────────────────────
  // API PÚBLICA DO MÓDULO
  // ─────────────────────────────────────────────
  return {
    // Posts
    getPosts,
    addPost,
    editPost,
    deletePost,

    // Perfil
    getProfile,
    saveProfile,
    patchProfile,
  };

})();
/**
 * ╔══════════════════════════════════════════════════════════════╗
 * ║  profile.js — Módulo de Perfil do Usuário                   ║
 * ║                                                              ║
 * ║  Responsável por:                                            ║
 * ║    • Ler e exibir os dados do perfil (nome, bio, avatar)     ║
 * ║    • Gerenciar uploads de foto de perfil e banner            ║
 * ║    • Controlar o formulário de edição de nome/bio            ║
 * ║    • Sincronizar o perfil com todos os elementos de UI       ║
 * ║                                                              ║
 * ║  Dependências: storage.js (deve ser carregado antes)         ║
 * ╚══════════════════════════════════════════════════════════════╝
 *
 * @module Profile
 * @exports {Object} Profile — API pública
 */

const Profile = (() => {

  // ═══════════════════════════════════════════
  // HELPERS INTERNOS
  // ═══════════════════════════════════════════

  /**
   * Gera as iniciais de um nome para uso como fallback do avatar.
   * Pega a primeira letra do primeiro nome e a primeira do último.
   *
   * @param  {string} name  Nome completo
   * @returns {string}      Ex: "João da Silva" → "JS" | "Ana" → "A"
   */
  function getInitials(name) {
    const parts = (name || 'U').trim().split(/\s+/).filter(Boolean);
    if (parts.length === 1) return parts[0][0].toUpperCase();
    return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
  }

  /**
   * Define o conteúdo de um avatar:
   *   • Se há uma imageUrl: insere <img> dentro do elemento
   *   • Caso contrário: exibe as iniciais como texto
   *
   * @param {HTMLElement}   el        Elemento do avatar (.post-ava, .compose-ava…)
   * @param {string}        name      Nome do usuário (para iniciais)
   * @param {string|null}   imageUrl  Data URL da foto ou null
   */
  function setAvatarContent(el, name, imageUrl) {
    if (!el) return;
    el.innerHTML = ''; // limpa conteúdo anterior

    if (imageUrl) {
      const img = document.createElement('img');
      img.src = imageUrl;
      img.alt = `Foto de ${name}`;
      el.appendChild(img);
    } else {
      el.textContent = getInitials(name);
    }
  }

  /**
   * Lê um arquivo de imagem e retorna uma Promise com a Data URL (Base64).
   * Usado para converter arquivos selecionados em strings armazenáveis.
   *
   * @param  {File}    file  Arquivo de imagem
   * @returns {Promise<string>} Data URL (ex: "data:image/jpeg;base64,...")
   */
  function fileToDataUrl(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload  = e => resolve(e.target.result);
      reader.onerror = () => reject(new Error('Falha ao ler a imagem.'));
      reader.readAsDataURL(file); // converte para Base64
    });
  }


  // ═══════════════════════════════════════════
  // SINCRONIZAÇÃO DE UI
  // ═══════════════════════════════════════════

  /**
   * Sincroniza TODOS os elementos de UI com os dados atuais do perfil.
   * Deve ser chamado após qualquer alteração no perfil.
   * Atualiza: avatar do compose, avatar grande, nome, bio, banner.
   */
  function syncUI() {
    const p = Storage.getProfile();
    const { name, bio, avatarUrl, bannerUrl } = p;

    // ── Avatar pequeno (compose box) ──────────────────
    const composeAva = document.getElementById('composeAva');
    setAvatarContent(composeAva, name, avatarUrl);

    // ── Avatar grande (aba de perfil) ─────────────────
    const profileAvaBig = document.getElementById('profileAvaBig');
    setAvatarContent(profileAvaBig, name, avatarUrl);

    // ── Nome ──────────────────────────────────────────
    const pNameEl = document.getElementById('pName');
    if (pNameEl) pNameEl.textContent = name;

    // ── Bio ───────────────────────────────────────────
    const pBioEl = document.getElementById('pBio');
    if (pBioEl) pBioEl.textContent = bio || '';

    // ── Banner ────────────────────────────────────────
    const bannerImg = document.getElementById('bannerImg');
    if (bannerImg) {
      if (bannerUrl) {
        bannerImg.src = bannerUrl;
        bannerImg.classList.remove('hidden');
      } else {
        bannerImg.src = '';
        bannerImg.classList.add('hidden');
      }
    }
  }


  // ═══════════════════════════════════════════
  // FORMULÁRIO DE EDIÇÃO
  // ═══════════════════════════════════════════

  /**
   * Abre o formulário de edição, preenchido com os dados atuais.
   * Oculta o botão "Editar perfil" enquanto o form está aberto.
   */
  function openEditForm() {
    const p = Storage.getProfile();

    // Preenche os campos com os valores atuais
    const nameInput = document.getElementById('eName');
    const bioInput  = document.getElementById('eBio');
    if (nameInput) nameInput.value = p.name;
    if (bioInput)  bioInput.value  = p.bio || '';

    // Exibe o form e oculta o botão
    document.getElementById('editForm').classList.remove('hidden');
    document.getElementById('btnEditP').style.display = 'none';

    // Foca no campo de nome para UX mais fluida
    if (nameInput) nameInput.focus();
  }

  /**
   * Fecha o formulário de edição sem salvar.
   * Restaura a visibilidade do botão "Editar perfil".
   */
  function closeEditForm() {
    document.getElementById('editForm').classList.add('hidden');
    document.getElementById('btnEditP').style.display = '';
  }

  /**
   * Valida e salva as alterações de nome e bio.
   * Sincroniza a UI e re-renderiza o feed para atualizar o nome nos posts.
   *
   * @returns {boolean} true se salvou com sucesso
   */
  function saveEditForm() {
    const nameVal = document.getElementById('eName').value.trim();
    const bioVal  = document.getElementById('eBio').value.trim();

    if (!nameVal) {
      UI.showToast('O nome não pode estar vazio.', 'err');
      document.getElementById('eName').focus();
      return false;
    }

    // Atualiza apenas nome e bio (preserva avatarUrl e bannerUrl)
    Storage.patchProfile({ name: nameVal, bio: bioVal });

    syncUI();
    closeEditForm();

    // Re-renderiza posts para refletir o novo nome do autor
    Posts.renderFeed();
    Posts.renderProfilePosts();

    UI.showToast('Perfil atualizado!', 'ok');
    return true;
  }


  // ═══════════════════════════════════════════
  // UPLOAD DE IMAGENS
  // ═══════════════════════════════════════════

  /**
   * Processa um arquivo de imagem e o salva como avatar ou banner.
   * Exibe feedback visual durante e após o processo.
   *
   * @param {File}   file   Arquivo de imagem selecionado
   * @param {'avatar'|'banner'} type  Tipo de imagem a atualizar
   */
  async function handleImageUpload(file, type) {
    if (!file) return;

    // Valida o tipo de arquivo (apenas imagens)
    if (!file.type.startsWith('image/')) {
      UI.showToast('Por favor, selecione apenas imagens.', 'err');
      return;
    }

    // Feedback de processamento
    UI.showToast('Carregando imagem…');

    try {
      // Converte o arquivo para Base64
      const dataUrl = await fileToDataUrl(file);

      if (type === 'avatar') {
        // Salva apenas o campo avatarUrl
        Storage.patchProfile({ avatarUrl: dataUrl });
        UI.showToast('Foto de perfil atualizada! 📸', 'ok');

      } else if (type === 'banner') {
        // Salva apenas o campo bannerUrl
        Storage.patchProfile({ bannerUrl: dataUrl });
        UI.showToast('Banner atualizado! 🖼️', 'ok');
      }

      // Sincroniza toda a UI com o novo dado
      syncUI();

    } catch (err) {
      // Pode ser quota exceeded ou erro de leitura
      console.error('[Profile] Erro ao fazer upload:', err);
      UI.showToast(err.message || 'Erro ao carregar imagem.', 'err');
    }
  }


  // ═══════════════════════════════════════════
  // GETTERS PÚBLICOS
  // ═══════════════════════════════════════════

  /** Retorna o perfil atual do storage. */
  function get() {
    return Storage.getProfile();
  }

  /** Retorna as iniciais do nome atual. */
  function getInitialsFromCurrent() {
    return getInitials(Storage.getProfile().name);
  }


  // ─────────────────────────────────────────────
  // API PÚBLICA
  // ─────────────────────────────────────────────
  return {
    get,
    getInitials,
    getInitialsFromCurrent,
    setAvatarContent,
    fileToDataUrl,
    syncUI,
    openEditForm,
    closeEditForm,
    saveEditForm,
    handleImageUpload,
  };

})();
/**
 * ╔══════════════════════════════════════════════════════════════╗
 * ║  posts.js — Módulo de Postagens                             ║
 * ║                                                              ║
 * ║  Responsável por:                                            ║
 * ║    • Renderizar o feed principal e o feed do perfil          ║
 * ║    • Criar novos posts (texto + imagem opcional)             ║
 * ║    • Abrir o modal de edição de texto                        ║
 * ║    • Confirmar e executar a exclusão de posts                ║
 * ║    • Atualizar contadores e estatísticas                     ║
 * ║    • Gerenciar o contador de caracteres da textarea          ║
 * ║                                                              ║
 * ║  Dependências (devem ser carregados antes):                  ║
 * ║    storage.js, profile.js                                    ║
 * ╚══════════════════════════════════════════════════════════════╝
 *
 * @module Posts
 * @exports {Object} Posts — API pública
 */

const Posts = (() => {

  /**
   * ID do post atualmente aberto no modal de edição.
   * null quando o modal está fechado.
   * @type {string|null}
   */
  let _editingPostId = null;

  /**
   * Data URL da imagem selecionada no compose box.
   * null quando nenhuma imagem foi selecionada.
   * @type {string|null}
   */
  let _pendingImageUrl = null;


  // ═══════════════════════════════════════════
  // HELPERS DE FORMATAÇÃO
  // ═══════════════════════════════════════════

  /**
   * Formata uma string ISO 8601 para exibição amigável em português.
   * Regras:
   *   - Hoje:     "Hoje às 14:32"
   *   - Ontem:    "Ontem às 09:05"
   *   - Demais:   "15 de jan. às 09:00"
   *
   * @param  {string} isoString  Data no formato ISO (ex: "2024-01-15T14:32:00Z")
   * @returns {string}           Data formatada
   */
  function formatDate(isoString) {
    const date = new Date(isoString);
    const now  = new Date();
    const time = date.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

    // Compara apenas as datas (sem hora) convertendo para string
    const dateStr      = date.toDateString();
    const todayStr     = now.toDateString();
    const yesterday    = new Date(now);
    yesterday.setDate(now.getDate() - 1);
    const yesterdayStr = yesterday.toDateString();

    if (dateStr === todayStr)     return `Hoje às ${time}`;
    if (dateStr === yesterdayStr) return `Ontem às ${time}`;

    // Datas mais antigas: "15 de jan. às 09:00"
    return date.toLocaleDateString('pt-BR', {
      day:   'numeric',
      month: 'short',
    }) + ` às ${time}`;
  }

  /**
   * Previne XSS escapando caracteres especiais de HTML.
   * Sempre usar ao inserir texto do usuário no DOM via innerHTML.
   *
   * @param  {string} str  Texto não confiável
   * @returns {string}     Texto com entidades HTML escapadas
   */
  function escapeHTML(str) {
    const div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
  }


  // ═══════════════════════════════════════════
  // RENDERIZAÇÃO DE CARDS
  // ═══════════════════════════════════════════

  /**
   * Cria e retorna o elemento HTML (<article>) de um único post.
   * Estrutura:
   *   article.post-card
   *     ├ .post-head (avatar + meta + botões de ação)
   *     ├ .post-text (texto escapado)
   *     ├ .post-image (se houver imagem)
   *     ├ .post-edited-tag (se editado)
   *     └ .post-footer (timestamp)
   *
   * Os event listeners de editar/excluir são adicionados aqui.
   *
   * @param  {PostObject} post  Objeto do post (ver storage.js para typedef)
   * @returns {HTMLElement}     Elemento <article> pronto para inserção
   */
  function createPostElement(post) {
    const profile  = Profile.get();
    const initials = Profile.getInitials(profile.name);

    const article = document.createElement('article');
    article.className   = 'post-card';
    article.dataset.id  = post.id;   // facilita seleções por ID

    // ── Cabeçalho ─────────────────────────────────
    const headHTML = `
      <div class="post-head">

        <!-- Avatar do autor -->
        <div class="post-ava" data-action="profile" title="Ver perfil">
          ${profile.avatarUrl
            ? `<img src="${profile.avatarUrl}" alt="Foto de ${escapeHTML(profile.name)}"/>`
            : escapeHTML(initials)
          }
        </div>

        <!-- Meta: nome + data -->
        <div class="post-meta">
          <div class="post-author">${escapeHTML(profile.name)}</div>
          <div class="post-date">${formatDate(post.createdAt)}</div>
        </div>

        <!-- Botões de ação (visíveis no hover via CSS) -->
        <div class="post-actions" role="group" aria-label="Ações do post">

          <!-- Editar: abre o modal de edição de texto -->
          <button
            class="pa-btn"
            data-action="edit"
            title="Editar postagem"
            aria-label="Editar postagem"
          >
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
          </button>

          <!-- Excluir: pede confirmação antes de apagar -->
          <button
            class="pa-btn del"
            data-action="delete"
            title="Excluir postagem"
            aria-label="Excluir postagem"
          >
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" aria-hidden="true">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6l-1 14H6L5 6"/>
              <path d="M10 11v6"/><path d="M14 11v6"/>
              <path d="M9 6V4h6v2"/>
            </svg>
          </button>

        </div><!-- /post-actions -->
      </div><!-- /post-head -->
    `;

    // ── Texto ──────────────────────────────────────
    // escapeHTML previne XSS; white-space:pre-wrap preserva quebras
    const textHTML = `<p class="post-text">${escapeHTML(post.text)}</p>`;

    // ── Imagem (opcional) ──────────────────────────
    // A imagem é clicável para abrir o lightbox
    const imageHTML = post.image
      ? `<div class="post-image">
           <img
             src="${post.image}"
             alt="Imagem da postagem"
             data-action="lightbox"
             title="Clique para ampliar"
             loading="lazy"
           />
         </div>`
      : '';

    // ── Tag de editado (opcional) ──────────────────
    const editedHTML = post.editedAt
      ? `<p class="post-edited-tag">editado ${formatDate(post.editedAt)}</p>`
      : '';

    // ── Rodapé com timestamp ───────────────────────
    const footerHTML = `
      <div class="post-footer">
        <time class="post-ts" datetime="${post.createdAt}">
          ${new Date(post.createdAt).toLocaleString('pt-BR', {
            day: 'numeric', month: 'short', year: 'numeric',
            hour: '2-digit', minute: '2-digit',
          })}
        </time>
      </div>
    `;

    // Monta o HTML completo do card
    article.innerHTML = headHTML + textHTML + imageHTML + editedHTML + footerHTML;

    // ── Event listeners via delegação ─────────────
    // Um único listener no card captura cliques em todos os filhos.
    // Identifica a ação pelo atributo data-action do elemento clicado.
    article.addEventListener('click', e => {
      const btn    = e.target.closest('[data-action]');
      if (!btn) return;

      const action = btn.dataset.action;

      switch (action) {
        case 'edit':
          // Abre o modal com o texto atual do post
          openEditModal(post.id, post.text);
          break;

        case 'delete':
          // Pede confirmação antes de apagar (não há desfazer)
          handleDelete(post.id);
          break;

        case 'lightbox':
          // Abre a imagem em tela cheia
          UI.openLightbox(post.image);
          break;

        case 'profile':
          // Navega para a aba de perfil
          UI.activateTab('profile');
          break;
      }
    });

    return article;
  }


  // ═══════════════════════════════════════════
  // RENDERIZAÇÃO DE FEEDS
  // ═══════════════════════════════════════════

  /**
   * Renderiza (ou re-renderiza) o feed principal.
   * Limpa o container e reinserido todos os posts.
   * Também atualiza o badge de contagem.
   *
   * Chamada em: inicialização, após publicar, editar ou excluir.
   */
  function renderFeed() {
    const feedEl   = document.getElementById('feedList');
    const emptyEl  = document.getElementById('feedEmpty');
    const badgeEl  = document.getElementById('postBadge');
    const posts    = Storage.getPosts();

    // Limpa o feed atual
    feedEl.innerHTML = '';

    if (posts.length === 0) {
      // Exibe estado vazio
      emptyEl.classList.remove('hidden');
      badgeEl.textContent = '0 posts';
      return;
    }

    emptyEl.classList.add('hidden');
    badgeEl.textContent = `${posts.length} post${posts.length !== 1 ? 's' : ''}`;

    // Insere os cards; CSS anima a entrada com stagger
    posts.forEach(post => {
      feedEl.appendChild(createPostElement(post));
    });
  }

  /**
   * Renderiza (ou re-renderiza) a lista de posts na aba de perfil.
   * Funciona exatamente como renderFeed, mas num container diferente.
   *
   * Chamada em: ativação da aba de perfil, após publicar/editar/excluir.
   */
  function renderProfilePosts() {
    const container = document.getElementById('profileFeed');
    const emptyEl   = document.getElementById('profileEmpty');
    const posts     = Storage.getPosts();

    container.innerHTML = '';

    if (posts.length === 0) {
      emptyEl.classList.remove('hidden');
      return;
    }

    emptyEl.classList.add('hidden');
    posts.forEach(post => {
      container.appendChild(createPostElement(post));
    });
  }

  /**
   * Atualiza os dois cards de estatísticas na aba de perfil.
   * - statPosts: total de posts
   * - statDays:  número de dias únicos com pelo menos um post
   */
  function updateStats() {
    const posts = Storage.getPosts();

    // Total de posts
    const statPostsEl = document.getElementById('statPosts');
    if (statPostsEl) statPostsEl.textContent = posts.length;

    // Dias únicos (converte createdAt para string de data e usa Set para deduplicar)
    const uniqueDays = new Set(
      posts.map(p => new Date(p.createdAt).toDateString())
    );
    const statDaysEl = document.getElementById('statDays');
    if (statDaysEl) statDaysEl.textContent = uniqueDays.size;
  }


  // ═══════════════════════════════════════════
  // AÇÕES DE POST
  // ═══════════════════════════════════════════

  /**
   * Publica um novo post.
   * Lê o texto da textarea e a imagem pendente (_pendingImageUrl).
   * Valida, salva, re-renderiza e limpa o compose.
   * Atalho: Ctrl+Enter / Cmd+Enter.
   */
  function handlePublish() {
    const input = document.getElementById('postInput');
    const text  = input.value.trim();

    if (!text) return;  // botão deveria estar disabled, mas verificamos mesmo assim

    try {
      // Salva no localStorage (imagem pode ser null)
      Storage.addPost(text, _pendingImageUrl);

      // Limpa o compose box
      input.value = '';
      clearPendingImage();
      updateCharCounter('charCount', input, 500);
      document.getElementById('btnPost').disabled = true;

      // Atualiza a UI
      renderFeed();
      updateStats();

      UI.showToast('Postagem publicada! 🎉', 'ok');

      // Scroll suave para o início do feed para ver o novo post
      document.getElementById('feedList').scrollIntoView({
        behavior: 'smooth',
        block:    'start',
      });

    } catch (err) {
      // Pode ser quota exceeded (imagem muito grande)
      UI.showToast(err.message, 'err');
    }
  }

  /**
   * Abre o modal de edição preenchido com o texto atual do post.
   * Armazena o ID do post em _editingPostId para uso no save.
   *
   * @param {string} postId      ID do post
   * @param {string} currentText Texto atual do post
   */
  function openEditModal(postId, currentText) {
    _editingPostId = postId;
    const ta = document.getElementById('editTa');
    ta.value = currentText;
    updateCharCounter('editCount', ta, 500);
    UI.openModal();
    ta.focus();
    ta.setSelectionRange(ta.value.length, ta.value.length); // cursor no fim
  }

  /**
   * Salva a edição do post aberto no modal.
   * Valida, atualiza no storage, fecha o modal e re-renderiza.
   */
  function handleSaveEdit() {
    if (!_editingPostId) return;

    const ta      = document.getElementById('editTa');
    const newText = ta.value.trim();

    if (!newText) {
      UI.showToast('O texto não pode estar vazio.', 'err');
      ta.focus();
      return;
    }

    Storage.editPost(_editingPostId, newText);
    _editingPostId = null;

    UI.closeModal();
    renderFeed();
    renderProfilePosts();

    UI.showToast('Postagem atualizada!', 'ok');
  }

  /**
   * Exibe confirmação e, se aceita, exclui o post.
   * Após excluir, re-renderiza o feed e as estatísticas.
   *
   * @param {string} postId  ID do post a excluir
   */
  function handleDelete(postId) {
    // Confirmação nativa (simples, sem depender de UI extra)
    if (!window.confirm('Deseja excluir esta postagem? Esta ação não pode ser desfeita.')) {
      return;
    }

    Storage.deletePost(postId);
    renderFeed();
    renderProfilePosts();
    updateStats();

    UI.showToast('Postagem excluída.', 'err');
  }


  // ═══════════════════════════════════════════
  // GESTÃO DE IMAGEM NO COMPOSE
  // ═══════════════════════════════════════════

  /**
   * Processa a imagem selecionada no <input id="imgInput">.
   * Converte para Base64, armazena em _pendingImageUrl
   * e exibe a prévia abaixo da textarea.
   *
   * @param {File} file  Arquivo de imagem selecionado
   */
  async function handleComposeImage(file) {
    if (!file) return;

    if (!file.type.startsWith('image/')) {
      UI.showToast('Por favor, selecione apenas imagens.', 'err');
      return;
    }

    try {
      UI.showToast('Carregando imagem…');

      // Converte para Base64
      const dataUrl = await Profile.fileToDataUrl(file);
      _pendingImageUrl = dataUrl;

      // Mostra a prévia
      const previewEl = document.getElementById('composeImgPreview');
      const previewImg = document.getElementById('composePreviewImg');
      previewImg.src = dataUrl;
      previewEl.classList.remove('hidden');

      // Marca o botão de imagem como ativo
      document.querySelector('.img-tool-btn').classList.add('has-image');

      UI.showToast('Imagem pronta para publicar!', 'ok');

    } catch (err) {
      console.error('[Posts] Erro ao carregar imagem:', err);
      UI.showToast('Erro ao carregar a imagem.', 'err');
    }
  }

  /**
   * Remove a imagem pendente do compose box.
   * Limpa a prévia, reseta o input file e a variável interna.
   */
  function clearPendingImage() {
    _pendingImageUrl = null;

    // Esconde a prévia
    const previewEl = document.getElementById('composeImgPreview');
    if (previewEl) previewEl.classList.add('hidden');

    const previewImg = document.getElementById('composePreviewImg');
    if (previewImg) previewImg.src = '';

    // Reseta o input file (permite selecionar o mesmo arquivo de novo)
    const imgInput = document.getElementById('imgInput');
    if (imgInput) imgInput.value = '';

    // Remove o estado ativo do botão de imagem
    const imgToolBtn = document.querySelector('.img-tool-btn');
    if (imgToolBtn) imgToolBtn.classList.remove('has-image');
  }


  // ═══════════════════════════════════════════
  // CONTADOR DE CARACTERES
  // ═══════════════════════════════════════════

  /**
   * Atualiza o elemento de contador de caracteres para um textarea.
   * Adiciona classes CSS de aviso (.warn e .danger) conforme o limite.
   *
   * @param {string}      counterId  ID do elemento span do contador
   * @param {HTMLElement} inputEl    Elemento textarea
   * @param {number}      maxLength  Limite máximo de caracteres
   */
  function updateCharCounter(counterId, inputEl, maxLength) {
    const counterEl = document.getElementById(counterId);
    if (!counterEl || !inputEl) return;

    const remaining = maxLength - inputEl.value.length;
    counterEl.textContent = remaining;

    // Remove classes anteriores para recalcular
    counterEl.classList.remove('warn', 'danger');

    if (remaining <= 20)  counterEl.classList.add('danger');
    else if (remaining <= 80) counterEl.classList.add('warn');
  }


  // ─────────────────────────────────────────────
  // API PÚBLICA
  // ─────────────────────────────────────────────
  return {
    renderFeed,
    renderProfilePosts,
    updateStats,
    handlePublish,
    openEditModal,
    handleSaveEdit,
    handleDelete,
    handleComposeImage,
    clearPendingImage,
    updateCharCounter,
  };

})();
/**
 * ╔══════════════════════════════════════════════════════════════╗
 * ║  ui.js — Módulo de Interface (UI)                           ║
 * ║                                                              ║
 * ║  Responsável por controle de estados de UI que não           ║
 * ║  pertencem a um domínio específico:                          ║
 * ║    • Sistema de abas (feed ↔ perfil)                        ║
 * ║    • Modal de edição de post (abrir/fechar)                  ║
 * ║    • Toast de notificação temporária                         ║
 * ║    • Lightbox de imagem em tela cheia                        ║
 * ║                                                              ║
 * ║  Dependências: nenhuma (não importa outros módulos)          ║
 * ╚══════════════════════════════════════════════════════════════╝
 *
 * @module UI
 * @exports {Object} UI — API pública
 */

const UI = (() => {

  // ═══════════════════════════════════════════
  // SISTEMA DE ABAS
  // ═══════════════════════════════════════════

  /**
   * Ativa uma aba pelo nome ('feed' ou 'profile').
   * Atualiza:
   *   1. Os painéis .tab-panel (adiciona/remove .active)
   *   2. Os botões da rail lateral (.rail-btn)
   *   3. Os botões da bottom-bar mobile (.bottom-btn)
   *   4. O atributo aria-current para acessibilidade
   * Ao ativar o perfil, re-renderiza posts e estatísticas.
   *
   * @param {'feed'|'profile'} tabName  Nome da aba a ativar
   */
  function activateTab(tabName) {
    // ── Painéis ──────────────────────────────────
    document.querySelectorAll('.tab-panel').forEach(panel => {
      const isTarget = panel.id === `tab-${tabName}`;
      panel.classList.toggle('active', isTarget);
    });

    // ── Botões de navegação (rail + bottom-bar) ───
    document.querySelectorAll('[data-tab]').forEach(btn => {
      const isTarget = btn.dataset.tab === tabName;
      btn.classList.toggle('active', isTarget);
      // Acessibilidade: indica a aba atual para leitores de tela
      btn.setAttribute('aria-current', isTarget ? 'page' : 'false');
    });

    // ── Ações específicas por aba ─────────────────
    if (tabName === 'profile') {
      // Renderiza posts e atualiza stats ao entrar no perfil
      Posts.renderProfilePosts();
      Posts.updateStats();
    }
  }


  // ═══════════════════════════════════════════
  // MODAL DE EDIÇÃO DE POST
  // ═══════════════════════════════════════════

  /**
   * Abre o modal de edição.
   * Bloqueia o scroll da página (body) para evitar scroll duplo.
   * Foca no textarea após a animação de abertura.
   */
  function openModal() {
    const backdrop = document.getElementById('modalBackdrop');
    backdrop.classList.remove('hidden');
    document.body.style.overflow = 'hidden';   // bloqueia scroll da página

    // Foca no textarea após a animação (250ms = duração do slideUp)
    setTimeout(() => {
      document.getElementById('editTa').focus();
    }, 260);
  }

  /**
   * Fecha o modal de edição.
   * Restaura o scroll da página.
   */
  function closeModal() {
    const backdrop = document.getElementById('modalBackdrop');
    backdrop.classList.add('hidden');
    document.body.style.overflow = '';   // libera scroll da página
  }


  // ═══════════════════════════════════════════
  // TOAST DE NOTIFICAÇÃO
  // ═══════════════════════════════════════════

  /**
   * Timer do toast atual (para resetar se um novo toast for chamado
   * antes do anterior terminar).
   * @type {number|null}
   */
  let _toastTimer = null;

  /**
   * Exibe uma notificação de toast temporária na parte inferior da tela.
   * Se já houver um toast visível, ele é substituído imediatamente.
   *
   * @param {string}              message  Texto a exibir
   * @param {''|'ok'|'err'}       type     Estilo: '' (neutro), 'ok' (verde), 'err' (vermelho)
   * @param {number}              duration Duração em ms (padrão: 2800)
   */
  function showToast(message, type = '', duration = 2800) {
    const toast = document.getElementById('toast');

    // Reseta timer anterior, se houver
    if (_toastTimer) {
      clearTimeout(_toastTimer);
      _toastTimer = null;
    }

    // Define conteúdo e tipo
    toast.textContent = message;
    toast.className   = `toast show ${type}`.trim();

    // Agenda o desaparecimento
    _toastTimer = setTimeout(() => {
      toast.classList.remove('show');
      _toastTimer = null;
    }, duration);
  }


  // ═══════════════════════════════════════════
  // LIGHTBOX DE IMAGEM
  // ═══════════════════════════════════════════

  /**
   * Abre o lightbox exibindo a imagem em tela cheia.
   * Bloqueia o scroll da página durante a exibição.
   *
   * @param {string} imageSrc  URL ou Data URL da imagem
   */
  function openLightbox(imageSrc) {
    const lightbox = document.getElementById('lightbox');
    const lbImg    = document.getElementById('lightboxImg');

    lbImg.src = imageSrc;
    lightbox.classList.remove('hidden');
    document.body.style.overflow = 'hidden';

    // Foca no botão de fechar (acessibilidade / ESC)
    document.getElementById('lightboxClose').focus();
  }

  /**
   * Fecha o lightbox e limpa a imagem.
   * Libera o scroll da página.
   */
  function closeLightbox() {
    const lightbox = document.getElementById('lightbox');
    lightbox.classList.add('hidden');
    document.getElementById('lightboxImg').src = '';
    document.body.style.overflow = '';
  }


  // ─────────────────────────────────────────────
  // API PÚBLICA
  // ─────────────────────────────────────────────
  return {
    activateTab,
    openModal,
    closeModal,
    showToast,
    openLightbox,
    closeLightbox,
  };

})();
/**
 * ╔══════════════════════════════════════════════════════════════╗
 * ║  app.js — Ponto de Entrada da Aplicação                     ║
 * ║                                                              ║
 * ║  Este é o "maestro" da aplicação.                            ║
 * ║  Responsável por:                                            ║
 * ║    1. Inicializar todos os módulos ao carregar a página      ║
 * ║    2. Registrar TODOS os event listeners                     ║
 * ║    3. Conectar os módulos entre si (storage ↔ ui ↔ posts)   ║
 * ║                                                              ║
 * ║  REGRA: app.js NÃO contém lógica de negócio.                ║
 * ║  Ele apenas chama métodos dos outros módulos.                ║
 * ║                                                              ║
 * ║  Ordem de carregamento obrigatória:                          ║
 * ║    storage.js → profile.js → posts.js → ui.js → app.js      ║
 * ╚══════════════════════════════════════════════════════════════╝
 */

/**
 * Aguarda o DOM estar completamente carregado antes de inicializar.
 * Garante que todos os elementos existam quando tentamos acessá-los.
 */
document.addEventListener('DOMContentLoaded', () => {

  // ═══════════════════════════════════════════
  // 1. INICIALIZAÇÃO
  //    Carrega dados do localStorage e renderiza
  //    o estado inicial da aplicação.
  // ═══════════════════════════════════════════

  // Carrega perfil (nome, bio, avatar, banner) e sincroniza a UI
  Profile.syncUI();

  // Renderiza os posts salvos no feed
  Posts.renderFeed();

  // Calcula e exibe as estatísticas iniciais
  Posts.updateStats();


  // ═══════════════════════════════════════════
  // 2. NAVEGAÇÃO ENTRE ABAS
  //    Ouve cliques em TODOS os elementos com data-tab,
  //    tanto na rail lateral quanto na bottom-bar mobile.
  // ═══════════════════════════════════════════

  /**
   * Delegação de eventos para navegação.
   * Qualquer clique em um elemento com [data-tab] ativa aquela aba.
   * Cobre: .rail-btn (desktop) e .bottom-btn (mobile).
   */
  document.querySelectorAll('[data-tab]').forEach(btn => {
    btn.addEventListener('click', () => {
      UI.activateTab(btn.dataset.tab);
    });

    // Suporte a teclado: Enter e Espaço ativam o botão
    btn.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        UI.activateTab(btn.dataset.tab);
      }
    });
  });

  // O avatar do compose também navega para a aba de perfil
  document.getElementById('composeAva').addEventListener('click', () => {
    UI.activateTab('profile');
  });


  // ═══════════════════════════════════════════
  // 3. COMPOSE BOX — CRIAR POST
  // ═══════════════════════════════════════════

  const postInput  = document.getElementById('postInput');
  const btnPost    = document.getElementById('btnPost');

  /**
   * Ao digitar na textarea:
   *   - Atualiza o contador de caracteres
   *   - Habilita/desabilita o botão "Publicar"
   *     (só habilitado quando há texto não-vazio)
   */
  postInput.addEventListener('input', () => {
    Posts.updateCharCounter('charCount', postInput, 500);
    btnPost.disabled = postInput.value.trim().length === 0;
  });

  /**
   * Atalho de teclado: Ctrl+Enter ou Cmd+Enter publica o post.
   * Mais fluido do que ter que usar o mouse.
   */
  postInput.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      if (!btnPost.disabled) {
        Posts.handlePublish();
      }
    }
  });

  /** Clique no botão "Publicar" */
  btnPost.addEventListener('click', () => {
    Posts.handlePublish();
  });


  // ═══════════════════════════════════════════
  // 4. UPLOAD DE IMAGEM NO COMPOSE
  // ═══════════════════════════════════════════

  /**
   * Quando o usuário seleciona um arquivo via <input id="imgInput">,
   * passa o arquivo para Posts.handleComposeImage() que o converte
   * para Base64 e exibe a prévia.
   */
  document.getElementById('imgInput').addEventListener('change', e => {
    const file = e.target.files[0];
    if (file) Posts.handleComposeImage(file);
  });

  /**
   * Botão ✕ remove a imagem selecionada do compose.
   * Limpa a prévia e a variável interna _pendingImageUrl.
   */
  document.getElementById('removeImgBtn').addEventListener('click', () => {
    Posts.clearPendingImage();
  });


  // ═══════════════════════════════════════════
  // 5. MODAL DE EDIÇÃO DE POST
  // ═══════════════════════════════════════════

  const editTa = document.getElementById('editTa');

  /**
   * Atualiza o contador de caracteres do textarea do modal
   * enquanto o usuário edita o texto.
   */
  editTa.addEventListener('input', () => {
    Posts.updateCharCounter('editCount', editTa, 500);
  });

  /** Botão "Salvar" do modal: salva a edição */
  document.getElementById('modalSaveBtn').addEventListener('click', () => {
    Posts.handleSaveEdit();
  });

  /**
   * Atalho Ctrl+Enter / Cmd+Enter também salva no modal
   * (mesma UX do compose box).
   */
  editTa.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      Posts.handleSaveEdit();
    }
  });

  /** Botão "Cancelar" do modal */
  document.getElementById('modalCancelBtn').addEventListener('click', () => {
    UI.closeModal();
  });

  /** Botão ✕ (fechar) do modal */
  document.getElementById('modalCloseBtn').addEventListener('click', () => {
    UI.closeModal();
  });

  /**
   * Clique no backdrop (fundo escuro) fecha o modal.
   * Verifica se o clique foi no próprio backdrop
   * (não em um filho, como o card do modal).
   */
  document.getElementById('modalBackdrop').addEventListener('click', e => {
    if (e.target === document.getElementById('modalBackdrop')) {
      UI.closeModal();
    }
  });

  /**
   * Tecla ESC fecha o modal (padrão de UX para modais).
   * Também fecha o lightbox se estiver aberto.
   */
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      UI.closeModal();
      UI.closeLightbox();
    }
  });


  // ═══════════════════════════════════════════
  // 6. LIGHTBOX DE IMAGEM
  // ═══════════════════════════════════════════

  /** Botão ✕ do lightbox */
  document.getElementById('lightboxClose').addEventListener('click', () => {
    UI.closeLightbox();
  });

  /**
   * Clique no fundo do lightbox (fora da imagem) também fecha.
   * Verifica se o clique foi no container, não na imagem.
   */
  document.getElementById('lightbox').addEventListener('click', e => {
    if (e.target === document.getElementById('lightbox')) {
      UI.closeLightbox();
    }
  });


  // ═══════════════════════════════════════════
  // 7. PERFIL — FORMULÁRIO DE EDIÇÃO
  // ═══════════════════════════════════════════

  /** Botão "Editar perfil": abre o formulário */
  document.getElementById('btnEditP').addEventListener('click', () => {
    Profile.openEditForm();
  });

  /** Botão "Cancelar" do formulário de edição */
  document.getElementById('btnCancelEdit').addEventListener('click', () => {
    Profile.closeEditForm();
  });

  /** Botão "Salvar" do formulário de edição */
  document.getElementById('btnSaveEdit').addEventListener('click', () => {
    Profile.saveEditForm();
  });

  /**
   * Enter no campo de nome salva o formulário (UX de formulário padrão).
   * Tab passa para o próximo campo normalmente.
   */
  document.getElementById('eName').addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      Profile.saveEditForm();
    }
  });


  // ═══════════════════════════════════════════
  // 8. PERFIL — UPLOAD DE AVATAR
  // ═══════════════════════════════════════════

  /**
   * Clique na foto de perfil grande abre o seletor de arquivo do avatar.
   * O input file real está dentro do .avatar-wrap (oculto via CSS).
   */
  document.getElementById('profileAvaBig').addEventListener('click', () => {
    document.getElementById('avatarInput').click();
  });

  /** Tecla Enter/Espaço no avatar também abre o seletor (acessibilidade) */
  document.getElementById('profileAvaBig').addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      document.getElementById('avatarInput').click();
    }
  });

  /**
   * Quando o usuário seleciona um arquivo para avatar,
   * Profile.handleImageUpload converte para Base64 e salva.
   */
  document.getElementById('avatarInput').addEventListener('change', e => {
    const file = e.target.files[0];
    if (file) Profile.handleImageUpload(file, 'avatar');
    e.target.value = ''; // reseta para permitir selecionar o mesmo arquivo
  });


  // ═══════════════════════════════════════════
  // 9. PERFIL — UPLOAD DE BANNER
  // ═══════════════════════════════════════════

  /**
   * Clique na zona do banner abre o seletor de arquivo do banner.
   * A zona inclui tanto a imagem quanto o overlay de hint.
   */
  document.getElementById('bannerZone').addEventListener('click', e => {
    // Evita abrir o seletor se o clique foi diretamente no input
    if (e.target.tagName !== 'INPUT') {
      document.getElementById('bannerInput').click();
    }
  });

  /** Tecla Enter/Espaço no banner abre o seletor (acessibilidade) */
  document.getElementById('bannerZone').addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      document.getElementById('bannerInput').click();
    }
  });

  /**
   * Quando o usuário seleciona um arquivo para banner,
   * Profile.handleImageUpload converte para Base64 e salva.
   */
  document.getElementById('bannerInput').addEventListener('change', e => {
    const file = e.target.files[0];
    if (file) Profile.handleImageUpload(file, 'banner');
    e.target.value = ''; // reseta para reusar
  });

  /**
   * BÔNUS: Drag & Drop no banner.
   * Permite arrastar uma imagem direto para a zona do banner.
   */
  const bannerZone = document.getElementById('bannerZone');

  bannerZone.addEventListener('dragover', e => {
    e.preventDefault(); // necessário para ativar o drop
    bannerZone.classList.add('drag-over');
  });

  bannerZone.addEventListener('dragleave', () => {
    bannerZone.classList.remove('drag-over');
  });

  bannerZone.addEventListener('drop', e => {
    e.preventDefault();
    bannerZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) {
      Profile.handleImageUpload(file, 'banner');
    } else if (file) {
      UI.showToast('Por favor, solte apenas imagens.', 'err');
    }
  });


}); // fim do DOMContentLoaded
</script>
</body></html>
