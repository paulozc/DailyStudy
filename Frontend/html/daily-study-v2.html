<!DOCTYPE html>
<!--
  DAILY STUDY v2.0 — Bundle autocontido
  Todos os CSS e JS estão embutidos neste único arquivo.
  Para o projeto modular completo (arquivos separados), use os
  arquivos na pasta /daily-study/.
-->
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Daily Study</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
/*
 * ╔══════════════════════════════════════════════════════════════╗
 * ║  variables.css — Design Tokens                              ║
 * ║                                                              ║
 * ║  Todas as variáveis CSS do projeto ficam aqui.              ║
 * ║  Altere aqui para modificar cores, espaçamentos ou fontes   ║
 * ║  em toda a aplicação de uma vez.                            ║
 * ╚══════════════════════════════════════════════════════════════╝
 */

:root {

  /* ──────────────────────────────────────────
     PALETA DE CORES
     Tema claro/quente inspirado em papel,
     com acento azul intenso para ações primárias.
  ────────────────────────────────────────── */

  /* Fundo da página */
  --bg:          #f4f2ee;    /* creme suave */
  --bg-2:        #eceae5;    /* creme um pouco mais escuro (hover, inputs) */

  /* Superfícies (cards, modais, compose) */
  --surface:     #ffffff;

  /* Bordas */
  --border:      #e3e0d8;    /* borda padrão */
  --border-2:    #ccc8be;    /* borda mais escura (hover, foco) */

  /* Texto */
  --ink:         #1c1a17;    /* texto principal */
  --ink-2:       #57544e;    /* texto secundário */
  --ink-3:       #9e9b95;    /* texto terciário / placeholders */

  /* Acento (ações primárias) */
  --accent:      #2550e8;
  --accent-h:    #1840c4;    /* hover do acento */
  --accent-bg:   #edf0fd;    /* fundo suave do acento */

  /* Semânticas */
  --danger:      #d43f3f;
  --danger-bg:   rgba(212,63,63,.08);
  --success:     #1f9966;
  --warn:        #c47a18;


  /* ──────────────────────────────────────────
     TIPOGRAFIA
  ────────────────────────────────────────── */

  /* Outfit: sans-serif geométrica — UI, labels, botões, navegação */
  --font-ui:     'Outfit', sans-serif;

  /* Lora: serifada elegante — corpo das postagens */
  --font-body:   'Lora', serif;


  /* ──────────────────────────────────────────
     ESPAÇAMENTOS
     Usar estas variáveis para padding/gap/margin
     mantém ritmo visual consistente.
  ────────────────────────────────────────── */
  --sp-xs:  4px;
  --sp-sm:  8px;
  --sp-md:  16px;
  --sp-lg:  24px;
  --sp-xl:  40px;


  /* ──────────────────────────────────────────
     BORDAS ARREDONDADAS
  ────────────────────────────────────────── */
  --r-xs:   4px;
  --r-sm:   8px;
  --r-md:   14px;
  --r-lg:   22px;
  --r-xl:   32px;
  --r-pill: 999px;


  /* ──────────────────────────────────────────
     SOMBRAS
  ────────────────────────────────────────── */
  --sh:     0 1px 3px rgba(0,0,0,.05), 0 4px 12px rgba(0,0,0,.06);
  --sh-lg:  0 4px 8px rgba(0,0,0,.04), 0 16px 48px rgba(0,0,0,.10);


  /* ──────────────────────────────────────────
     LAYOUT
  ────────────────────────────────────────── */

  /* Largura da rail lateral de navegação */
  --sidebar-w:   76px;

  /* Largura máxima da coluna central de conteúdo */
  --content-max: 640px;

  /* Altura da barra inferior mobile */
  --bottom-bar-h: 58px;


  /* ──────────────────────────────────────────
     TRANSIÇÕES
     Usar --t para transições padrão de hover/foco.
  ────────────────────────────────────────── */
  --t:      .18s ease;
  --t-slow: .35s ease;

}
/*
 * ╔══════════════════════════════════════════════════════════════╗
 * ║  reset.css — Normalização e Estilos Base                    ║
 * ║                                                              ║
 * ║  Remove inconsistências entre browsers e define os estilos  ║
 * ║  mais básicos de HTML e body.                                ║
 * ╚══════════════════════════════════════════════════════════════╝
 */

/* ── Box model universal ─────────────────────────── */
*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

/* ── Base da página ──────────────────────────────── */
html {
  font-size: 16px;
  scroll-behavior: smooth;
}

body {
  font-family: var(--font-ui);
  background-color: var(--bg);
  color: var(--ink);
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;  /* suaviza texto no WebKit */
  -moz-osx-font-smoothing: grayscale;   /* suaviza texto no Firefox/macOS */
}

/* ── Botões: herdam fonte e removem estilos nativos ─ */
button {
  font-family: inherit;
  cursor: pointer;
  border: none;
  background: none;
  color: inherit;
  line-height: inherit;
}

/* ── Campos de texto ─────────────────────────────── */
input,
textarea {
  font-family: inherit;
  border: none;
  outline: none;
  background: none;
  color: inherit;
  resize: none;       /* desabilita resize manual do textarea */
  line-height: inherit;
}

/* ── Listas ──────────────────────────────────────── */
ul,
ol {
  list-style: none;
}

/* ── Imagens ─────────────────────────────────────── */
img {
  display: block;
  max-width: 100%;
  object-fit: cover;  /* padrão; cada uso pode sobrescrever */
}

/* ── Links ───────────────────────────────────────── */
a {
  color: inherit;
  text-decoration: none;
}

/* ── Inputs de arquivo SEMPRE ocultos ───────────────
   Todos os <input type="file"> são acionados por
   <label> clicáveis visualmente estilizados.         */
input[type="file"] {
  display: none;
}

/* ── Classe utilitária de ocultamento ───────────────
   Usa !important para garantir que o JS possa
   mostrar/ocultar elementos adicionando/removendo
   esta classe sem conflito com outros estilos.       */
.hidden {
  display: none !important;
}
/*
 * ╔══════════════════════════════════════════════════════════════╗
 * ║  layout.css — Estrutura da Página                           ║
 * ║                                                              ║
 * ║  Define o esqueleto do app:                                  ║
 * ║    .app-shell     → container raiz flex                      ║
 * ║    .rail          → navegação lateral (desktop)              ║
 * ║    .center-col    → coluna central com o conteúdo            ║
 * ║    .tab-panel     → painéis de aba (feed / perfil)           ║
 * ║    .bottom-bar    → navegação inferior (mobile)              ║
 * ╚══════════════════════════════════════════════════════════════╝
 */


/* ══════════════════════════════════════════════
   APP SHELL — container raiz
   Usa flexbox horizontal; a rail fica à esquerda
   e a coluna central ocupa o restante.
══════════════════════════════════════════════ */
.app-shell {
  display: flex;
  min-height: 100vh;
}


/* ══════════════════════════════════════════════
   RAIL — barra lateral de navegação (desktop)
   Posição fixa para não sair de vista durante scroll.
   Oculta em mobile via media query abaixo.
══════════════════════════════════════════════ */
.rail {
  position: fixed;
  top: 0;
  left: 0;
  width: var(--sidebar-w);
  height: 100vh;
  background: var(--surface);
  border-right: 1px solid var(--border);

  /* Empilha itens verticalmente, centralizados horizontalmente */
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 0;
  gap: 4px;

  z-index: 200;   /* acima do conteúdo, abaixo de modais (z:500) */
}

/* ── Logo da rail ─────────────────────────────── */
.rail-logo {
  font-family: var(--font-ui);
  font-weight: 800;
  font-size: .82rem;
  letter-spacing: -.01em;
  background: var(--ink);
  color: #fff;
  width: 40px;
  height: 40px;
  border-radius: 11px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 18px;
  user-select: none;
}

/* ── Botões da rail ───────────────────────────── */
.rail-btn {
  position: relative;                 /* para o tooltip absoluto */
  width: 48px;
  height: 48px;
  border-radius: var(--r-md);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--ink-3);
  transition: background var(--t), color var(--t);
}

.rail-btn:hover {
  background: var(--bg-2);
  color: var(--ink);
}

.rail-btn.active {
  background: var(--accent-bg);
  color: var(--accent);
}

/* Tooltip lateral que aparece no hover do botão */
.rail-tooltip {
  position: absolute;
  left: calc(100% + 12px);     /* à direita do botão */
  background: var(--ink);
  color: #fff;
  font-size: .72rem;
  font-weight: 600;
  padding: 5px 10px;
  border-radius: var(--r-sm);
  white-space: nowrap;
  pointer-events: none;        /* não bloqueia interações */
  opacity: 0;
  transform: translateX(-6px);
  transition: opacity var(--t), transform var(--t);
}

.rail-btn:hover .rail-tooltip {
  opacity: 1;
  transform: translateX(0);
}


/* ══════════════════════════════════════════════
   COLUNA CENTRAL — conteúdo das abas
   margin-left = largura da rail para não sobrepor.
   max-width garante leitura confortável.
══════════════════════════════════════════════ */
.center-col {
  margin-left: var(--sidebar-w);
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;           /* centraliza o conteúdo horizontalmente */
  padding: 32px 16px 80px;       /* 80px embaixo = espaço para bottom-bar no mobile */
}

/* Todos os painéis de aba respeitam a largura máxima */
.center-col > .tab-panel {
  width: 100%;
  max-width: var(--content-max);
}


/* ══════════════════════════════════════════════
   TAB PANELS — painéis alternáveis (feed / perfil)
   Cada painel é display:none por padrão;
   recebe .active ao ser selecionado.
══════════════════════════════════════════════ */
.tab-panel {
  display: none;
  /* Animação de entrada suave ao trocar de aba */
  animation: fadeUp .28s ease both;
}

.tab-panel.active {
  display: block;
}


/* ══════════════════════════════════════════════
   BOTTOM BAR — barra de navegação mobile
   Fica oculta em desktop; exibida em ≤ 640px.
   Posição fixa na parte inferior da tela.
══════════════════════════════════════════════ */
.bottom-bar {
  /* Oculto em desktop por padrão */
  display: none;

  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: var(--bottom-bar-h);
  background: var(--surface);
  border-top: 1px solid var(--border);
  align-items: center;
  justify-content: space-around;
  z-index: 200;
}

/* Botões da barra inferior */
.bottom-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  font-size: .65rem;
  font-weight: 600;
  color: var(--ink-3);
  padding: 6px 24px;
  border-radius: var(--r-md);
  transition: color var(--t);
}

.bottom-btn.active {
  color: var(--accent);
}


/* ══════════════════════════════════════════════
   RESPONSIVIDADE
   Em telas ≤ 640px:
     - A rail desaparece
     - A bottom-bar aparece (display:flex)
     - A coluna central começa do 0 (sem margem lateral)
     - O padding superior considera a topbar implícita
══════════════════════════════════════════════ */
@media (max-width: 640px) {

  /* Oculta a rail lateral */
  .rail {
    display: none;
  }

  /* Exibe a barra inferior */
  .bottom-bar {
    display: flex;
  }

  /* Remove a margem que compensava a rail */
  .center-col {
    margin-left: 0;
    padding: 20px 12px calc(var(--bottom-bar-h) + 16px);
  }

}
/*
 * ╔══════════════════════════════════════════════════════════════╗
 * ║  components.css — Componentes Reutilizáveis de UI           ║
 * ║                                                              ║
 * ║  Peças de interface que aparecem em múltiplos contextos:     ║
 * ║    Botões primário, secundário e de post                     ║
 * ║    Avatares (pequeno e grande)                               ║
 * ║    Contador de caracteres                                    ║
 * ║    Modal de edição de post                                   ║
 * ║    Toast de notificação                                      ║
 * ║    Lightbox de imagem                                        ║
 * ║    Estado vazio (empty state)                                ║
 * ╚══════════════════════════════════════════════════════════════╝
 */


/* ══════════════════════════════════════════════
   BOTÕES
══════════════════════════════════════════════ */

/*
  btn-primary: ação principal (Salvar, Publicar…)
  Fundo no acento com sombra colorida.
*/
.btn-primary {
  padding: 9px 22px;
  border-radius: var(--r-pill);
  background: var(--accent);
  color: #fff;
  font-weight: 700;
  font-size: .85rem;
  transition: background var(--t), transform var(--t), box-shadow var(--t);
  box-shadow: 0 2px 8px rgba(37,80,232,.28);
}

.btn-primary:hover {
  background: var(--accent-h);
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(37,80,232,.38);
}

.btn-primary:active {
  transform: translateY(0);
}

/*
  btn-secondary: ação secundária (Cancelar…)
  Borda sutil, sem fundo.
*/
.btn-secondary {
  padding: 9px 18px;
  border-radius: var(--r-pill);
  border: 1.5px solid var(--border-2);
  color: var(--ink-2);
  font-size: .85rem;
  font-weight: 500;
  transition: background var(--t), border-color var(--t);
}

.btn-secondary:hover {
  background: var(--bg-2);
  border-color: var(--ink-3);
}

/*
  btn-post: botão "Publicar" dentro do compose box
  Variação compacta do btn-primary com ícone inline.
*/
.btn-post {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 9px 20px;
  border-radius: var(--r-pill);
  background: var(--accent);
  color: #fff;
  font-weight: 700;
  font-size: .85rem;
  transition: background var(--t), transform var(--t), box-shadow var(--t);
  box-shadow: 0 2px 8px rgba(37,80,232,.28);
  white-space: nowrap;
}

.btn-post:hover {
  background: var(--accent-h);
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(37,80,232,.38);
}

.btn-post:active {
  transform: translateY(0);
}

/* Desabilitado: sem cursor e opacidade reduzida */
.btn-post:disabled {
  opacity: .4;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

/*
  btn-edit-p: botão "Editar perfil" no hero do perfil
  Apenas borda; ativo no hover do acento.
*/
.btn-edit-p {
  padding: 8px 18px;
  border-radius: var(--r-pill);
  border: 1.5px solid var(--border-2);
  color: var(--ink-2);
  font-weight: 600;
  font-size: .82rem;
  transition: border-color var(--t), color var(--t), background var(--t);
  white-space: nowrap;
}

.btn-edit-p:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-bg);
}


/* ══════════════════════════════════════════════
   AVATARES PEQUENOS
   Usados no compose e nos posts do feed.
   Exibem iniciais do nome ou uma foto (img dentro).
══════════════════════════════════════════════ */
.post-ava,
.compose-ava {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: var(--ink);
  color: #fff;
  font-weight: 700;
  font-size: .78rem;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;           /* não encolhe em flex */
  overflow: hidden;
  border: 2px solid var(--border);
  transition: border-color var(--t), box-shadow var(--t);
  cursor: pointer;
  user-select: none;
}

/* Quando contém uma foto: a imagem preenche todo o círculo */
.post-ava img,
.compose-ava img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.compose-ava:hover {
  border-color: var(--accent);
}


/* ══════════════════════════════════════════════
   CONTADOR DE CARACTERES
   Muda de cor conforme o limite se aproxima.
══════════════════════════════════════════════ */
.char-counter {
  font-size: .73rem;
  color: var(--ink-3);
  min-width: 28px;
  text-align: right;
  transition: color var(--t);
}

/* Aviso: ≤ 80 caracteres restantes */
.char-counter.warn {
  color: var(--warn);
  font-weight: 600;
}

/* Perigo: ≤ 20 caracteres restantes */
.char-counter.danger {
  color: var(--danger);
  font-weight: 700;
}


/* ══════════════════════════════════════════════
   MODAL DE EDIÇÃO DE POST
   Backdrop com blur + card centralizado.
══════════════════════════════════════════════ */

/* Fundo escurecido com blur */
.modal-backdrop {
  position: fixed;
  inset: 0;                               /* cobre tela toda */
  background: rgba(28, 26, 23, .55);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  z-index: 500;                           /* acima de tudo exceto toasts */
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  animation: fadeIn .15s ease;
}

/* Card do modal */
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  width: 100%;
  max-width: 520px;
  box-shadow: var(--sh-lg);
  animation: slideUp .25s cubic-bezier(.34, 1.56, .64, 1);
}

/* Cabeçalho: título + botão fechar */
.modal-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 22px;
  border-bottom: 1px solid var(--border);
}

.modal-head h3 {
  font-size: 1rem;
  font-weight: 700;
}

/* Botão ✕ para fechar o modal */
.modal-close-btn {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--ink-3);
  font-size: .85rem;
  transition: background var(--t), color var(--t);
}

.modal-close-btn:hover {
  background: var(--bg-2);
  color: var(--ink);
}

/* Textarea de edição */
.modal-ta {
  width: 100%;
  padding: 16px 22px;
  font-family: var(--font-body);
  font-size: .95rem;
  line-height: 1.65;
  color: var(--ink);
  background: transparent;
  min-height: 120px;
}

/* Rodapé: contador + botões */
.modal-foot {
  padding: 12px 22px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.modal-actions {
  display: flex;
  gap: var(--sp-sm);
}


/* ══════════════════════════════════════════════
   TOAST — Notificação temporária flutuante
   Posicionado na parte inferior da tela.
   Aparece/desaparece com classes .show .ok .err.
══════════════════════════════════════════════ */
.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(16px);  /* começa levemente abaixo */
  background: var(--ink);
  color: #fff;
  padding: 11px 24px;
  border-radius: var(--r-pill);
  font-size: .84rem;
  font-weight: 600;
  z-index: 900;                 /* acima de tudo */
  opacity: 0;
  white-space: nowrap;
  box-shadow: var(--sh-lg);
  transition: opacity .22s ease, transform .22s ease;
  pointer-events: none;         /* não bloqueia cliques quando invisível */
}

/* Estado visível */
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Variante sucesso (verde) */
.toast.ok {
  background: var(--success);
}

/* Variante erro (vermelho) */
.toast.err {
  background: var(--danger);
}

/* Em mobile: sobe acima da bottom-bar */
@media (max-width: 640px) {
  .toast {
    bottom: calc(var(--bottom-bar-h) + 16px);
  }
}


/* ══════════════════════════════════════════════
   LIGHTBOX — Visualizador de imagem em tela cheia
══════════════════════════════════════════════ */
.lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, .9);
  z-index: 800;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  cursor: zoom-out;
  animation: fadeIn .18s ease;
}

.lightbox img {
  max-width: min(90vw, 900px);
  max-height: 90vh;
  border-radius: var(--r-md);
  object-fit: contain;           /* não corta a imagem */
  box-shadow: var(--sh-lg);
  cursor: default;
}

/* Botão de fechar no canto superior direito */
.lightbox-close {
  position: fixed;
  top: 18px;
  right: 18px;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: rgba(255, 255, 255, .15);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: .9rem;
  transition: background var(--t);
  z-index: 801;
}

.lightbox-close:hover {
  background: rgba(255, 255, 255, .28);
}


/* ══════════════════════════════════════════════
   EMPTY STATE — mensagem quando não há conteúdo
══════════════════════════════════════════════ */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: 60px 20px;
  gap: 10px;
}

.empty-ico {
  font-size: 3rem;
  line-height: 1;
  margin-bottom: 4px;
}

.empty-state h3 {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--ink);
}

.empty-state p {
  font-size: .88rem;
  color: var(--ink-3);
  max-width: 260px;
}


/* ══════════════════════════════════════════════
   FORMULÁRIO DE EDIÇÃO (campos genéricos)
   Usado na aba de perfil.
══════════════════════════════════════════════ */
.edit-form {
  background: var(--surface);
  border: 2px solid var(--accent);
  border-radius: var(--r-xl);
  padding: 24px;
  box-shadow: var(--sh-lg);
  animation: fadeUp .2s ease;
}

.edit-form h3 {
  font-size: 1rem;
  font-weight: 700;
  margin-bottom: 20px;
}

/* Par label + campo */
.form-field {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 16px;
}

.form-field label {
  font-size: .76rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--ink-3);
}

.form-field input,
.form-field textarea {
  background: var(--bg-2);
  border: 1.5px solid var(--border);
  border-radius: var(--r-md);
  padding: 10px 14px;
  font-size: .9rem;
  color: var(--ink);
  transition: border-color var(--t), box-shadow var(--t);
}

.form-field input:focus,
.form-field textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(37,80,232,.1);
}

.form-actions {
  display: flex;
  justify-content: flex-end;
  gap: var(--sp-sm);
  margin-top: 8px;
}
/*
 * ╔══════════════════════════════════════════════════════════════╗
 * ║  feed.css — Compose Box e Cards de Post                     ║
 * ║                                                              ║
 * ║  Estilos específicos da aba "Feed":                          ║
 * ║    .feed-top          → título + badge de contagem           ║
 * ║    .compose           → caixa de criação de post             ║
 * ║    .compose-img-preview → prévia da imagem selecionada       ║
 * ║    .tool-btn           → botão de ferramenta (imagem…)       ║
 * ║    .feed-list          → container dos posts                 ║
 * ║    .post-card          → card individual de post             ║
 * ║    .post-image         → imagem anexada ao post              ║
 * ╚══════════════════════════════════════════════════════════════╝
 */


/* ══════════════════════════════════════════════
   TOPO DO FEED
   Linha com título e contador de posts.
══════════════════════════════════════════════ */
.feed-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.feed-title {
  font-size: 1.55rem;
  font-weight: 800;
  letter-spacing: -.03em;
}

/* Pílula de contagem de posts */
.post-badge {
  font-size: .73rem;
  font-weight: 600;
  color: var(--ink-3);
  background: var(--bg-2);
  padding: 4px 12px;
  border-radius: var(--r-pill);
}


/* ══════════════════════════════════════════════
   COMPOSE BOX
   Card de criação de post com avatar + textarea.
   Muda borda ao receber foco (focus-within).
══════════════════════════════════════════════ */
.compose {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--r-xl);
  padding: 18px;
  margin-bottom: 20px;
  box-shadow: var(--sh);
  transition: border-color var(--t), box-shadow var(--t);
}

/* Borda azul + sombra leve ao ter foco em qualquer filho */
.compose:focus-within {
  border-color: var(--accent);
  box-shadow: var(--sh), 0 0 0 3px rgba(37,80,232,.08);
}

/* Linha: avatar + corpo */
.compose-row {
  display: flex;
  gap: 14px;
  align-items: flex-start;
}

/* O avatar ocupa espaço fixo; não encolhe */
.compose-ava {
  margin-top: 2px;  /* alinha visualmente com o texto */
}

/* Corpo do compose: empilhado verticalmente */
.compose-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 10px;
  min-width: 0;     /* impede overflow em flex */
}

/* Textarea do compose */
.compose-ta {
  width: 100%;
  font-family: var(--font-body);
  font-size: 1rem;
  color: var(--ink);
  line-height: 1.65;
  min-height: 56px;
  background: transparent;
}

.compose-ta::placeholder {
  color: var(--ink-3);
}


/* ══════════════════════════════════════════════
   PRÉ-VISUALIZAÇÃO DE IMAGEM NO COMPOSE
   Aparece abaixo da textarea quando o usuário
   seleciona uma imagem. Inclui botão para remover.
══════════════════════════════════════════════ */
.compose-img-preview {
  position: relative;
  border-radius: var(--r-md);
  overflow: hidden;
  border: 1px solid var(--border);
  /* Limita a altura para não tomar a tela toda */
  max-height: 280px;
  background: var(--bg-2);
}

.compose-img-preview img {
  width: 100%;
  max-height: 280px;
  object-fit: cover;
  display: block;
}

/* Botão ✕ para remover a imagem selecionada */
.remove-img-btn {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: rgba(0, 0, 0, .6);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: .78rem;
  transition: background var(--t);
}

.remove-img-btn:hover {
  background: var(--danger);
}


/* ══════════════════════════════════════════════
   RODAPÉ DO COMPOSE
   Linha com ferramentas à esquerda e ações à direita.
══════════════════════════════════════════════ */
.compose-foot {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.compose-tools {
  display: flex;
  gap: 6px;
}

/* Lado direito: contador + botão publicar */
.compose-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

/*
  Botão de ferramenta (ex: "Imagem")
  Usa <label> para acionar o <input type="file"> oculto.
  Estilizado como um botão discreto com ícone + texto.
*/
.tool-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 12px;
  border-radius: var(--r-sm);
  font-size: .78rem;
  font-weight: 600;
  color: var(--ink-3);
  cursor: pointer;
  transition: background var(--t), color var(--t);
  user-select: none;
}

.tool-btn:hover {
  background: var(--bg-2);
  color: var(--accent);
}

/* Estado ativo: quando uma imagem já foi selecionada */
.tool-btn.has-image {
  color: var(--accent);
  background: var(--accent-bg);
}


/* ══════════════════════════════════════════════
   LISTA DE POSTS
   Container flex vertical com espaçamento
   entre os cards.
══════════════════════════════════════════════ */
.feed-list {
  display: flex;
  flex-direction: column;
  gap: 16px;
}


/* ══════════════════════════════════════════════
   POST CARD
   Card individual de cada postagem.
   Estrutura: cabeçalho (avatar + meta + ações)
              + corpo (texto)
              + imagem (opcional)
              + rodapé (timestamp)
══════════════════════════════════════════════ */
.post-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--r-xl);
  padding: 20px 22px;
  box-shadow: var(--sh);
  /* Animação de entrada; cada card tem delay escalonado (ver animations.css) */
  animation: fadeUp .3s ease both;
  transition: border-color var(--t), box-shadow var(--t);
}

.post-card:hover {
  border-color: var(--border-2);
  box-shadow: var(--sh-lg);
}

/* ── Cabeçalho do card ───────────────────────── */
.post-head {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 12px;
}

/* Avatar do post (estilizado em components.css) */
.post-ava {
  width: 40px;
  height: 40px;
  font-size: .75rem;
  margin-top: 1px;  /* alinha com a primeira linha do texto */
}

/* Meta: nome do autor + data */
.post-meta {
  flex: 1;
  min-width: 0;
}

.post-author {
  font-weight: 700;
  font-size: .9rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.post-date {
  font-size: .72rem;
  color: var(--ink-3);
  margin-top: 1px;
}

/*
  Botões de ação (editar / excluir)
  Ficam invisíveis e aparecem no hover do card.
  Isso mantém a interface limpa.
*/
.post-actions {
  display: flex;
  gap: 4px;
  /* Oculto por padrão */
  opacity: 0;
  transition: opacity var(--t);
}

/* Revela botões ao passar o mouse no card */
.post-card:hover .post-actions {
  opacity: 1;
}

/* Botão individual de ação (editar / excluir) */
.pa-btn {
  width: 30px;
  height: 30px;
  border-radius: var(--r-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--ink-3);
  font-size: .8rem;
  transition: background var(--t), color var(--t);
}

.pa-btn:hover {
  background: var(--bg-2);
  color: var(--ink);
}

/* Variante: botão excluir (vermelho no hover) */
.pa-btn.del:hover {
  background: var(--danger-bg);
  color: var(--danger);
}

/* ── Texto do post ───────────────────────────── */
.post-text {
  font-family: var(--font-body);
  font-size: .95rem;
  line-height: 1.72;
  color: var(--ink);
  white-space: pre-wrap;    /* preserva quebras de linha do usuário */
  word-break: break-word;   /* quebra palavras longas/URLs */
}

/* ── Imagem do post ──────────────────────────── */
.post-image {
  margin-top: 14px;
  border-radius: var(--r-md);
  overflow: hidden;
  border: 1px solid var(--border);
  /* Limita altura máxima para evitar imagens enormes */
  max-height: 480px;
  background: var(--bg-2);
  cursor: zoom-in;          /* indica que é clicável para ampliar */
}

.post-image img {
  width: 100%;
  max-height: 480px;
  object-fit: cover;
  display: block;
  transition: transform var(--t-slow);
}

/* Leve zoom ao passar o mouse */
.post-image:hover img {
  transform: scale(1.015);
}

/* ── Rodapé do post ──────────────────────────── */
.post-footer {
  margin-top: 14px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 16px;
}

/* Timestamp no rodapé */
.post-ts {
  font-size: .7rem;
  color: var(--ink-3);
  margin-left: auto;  /* empurra para a direita */
}

/* Tag de "editado" exibida nos posts modificados */
.post-edited-tag {
  font-size: .7rem;
  color: var(--ink-3);
  font-style: italic;
  margin-top: 10px;
}
/*
 * ╔══════════════════════════════════════════════════════════════╗
 * ║  profile.css — Aba de Perfil                                ║
 * ║                                                              ║
 * ║  Estilos da aba "Perfil":                                    ║
 * ║    .profile-hero     → card com banner + avatar + info       ║
 * ║    .banner-zone      → zona clicável do banner               ║
 * ║    .avatar-wrap      → wrapper do avatar grande              ║
 * ║    .profile-ava-big  → avatar grande (foto de perfil)        ║
 * ║    .ava-edit-badge   → ícone de lápis sobre o avatar         ║
 * ║    .stats-row        → grade de estatísticas                 ║
 * ║    .section-head     → cabeçalho de seção com linha          ║
 * ╚══════════════════════════════════════════════════════════════╝
 */


/* ══════════════════════════════════════════════
   WRAPPER DA PÁGINA DE PERFIL
   Empilha verticalmente todos os blocos do perfil.
══════════════════════════════════════════════ */
.profile-wrap {
  display: flex;
  flex-direction: column;
  gap: 20px;
}


/* ══════════════════════════════════════════════
   HERO CARD
   Card principal: banner (topo) + body (avatar + info).
   overflow:hidden garante que o banner respeite o border-radius.
══════════════════════════════════════════════ */
.profile-hero {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--r-xl);
  overflow: hidden;
  box-shadow: var(--sh);
}


/* ══════════════════════════════════════════════
   ZONA DO BANNER
   Área clicável que cobre toda a largura do card.
   O clique aciona o <input file> do banner via JS.
   Exibe um overlay com hint no hover.
══════════════════════════════════════════════ */
.banner-zone {
  position: relative;
  height: 190px;
  /* Gradiente padrão quando não há imagem de banner */
  background:
    linear-gradient(
      135deg,
      #1c1f2e 0%,
      #263252 40%,
      #1a2640 70%,
      #111620 100%
    );
  cursor: pointer;
  overflow: hidden;
}

/* Textura de grade sobre o banner para dar profundidade */
.banner-zone::after {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    45deg,
    transparent,
    transparent 22px,
    rgba(255, 255, 255, .025) 22px,
    rgba(255, 255, 255, .025) 23px
  );
  pointer-events: none;
}

/* Imagem do banner (quando definida) */
.banner-zone img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  position: absolute;
  inset: 0;
  /* Fica acima do ::after para cobrir a textura */
  z-index: 1;
}

/* Overlay escuro com texto de hint — visível no hover */
.banner-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, .42);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  color: #fff;
  font-weight: 600;
  font-size: .88rem;
  opacity: 0;
  transition: opacity var(--t);
  /* Fica acima da imagem do banner */
  z-index: 2;
}

.banner-zone:hover .banner-overlay {
  opacity: 1;
}

/* Feedback visual ao arrastar arquivo sobre o banner */
.banner-zone.drag-over {
  outline: 3px dashed rgba(255,255,255,.6);
  outline-offset: -6px;
}


/* ══════════════════════════════════════════════
   BODY DO PERFIL
   Área abaixo do banner: avatar flutuante + textos.
══════════════════════════════════════════════ */
.profile-body {
  padding: 0 22px 22px;
}


/* ══════════════════════════════════════════════
   AVATAR WRAPPER
   O margin-top negativo faz o avatar "escalar" para
   cima do banner — efeito característico de redes sociais.
   position:relative permite posicionar o badge.
══════════════════════════════════════════════ */
.avatar-wrap {
  position: relative;
  display: inline-block;
  margin-top: -40px;    /* metade da altura do avatar = sobreposição */
  margin-bottom: 14px;
}

/*
  AVATAR GRANDE — foto de perfil
  Borda branca separa o avatar do banner.
  Clique aciona o input file do avatar.
*/
.profile-ava-big {
  width: 82px;
  height: 82px;
  border-radius: 50%;
  background: var(--ink);
  color: #fff;
  font-weight: 800;
  font-size: 1.5rem;
  display: flex;
  align-items: center;
  justify-content: center;
  /* Borda branca para separar do banner */
  border: 4px solid var(--surface);
  overflow: hidden;
  cursor: pointer;
  box-shadow: 0 2px 12px rgba(0,0,0,.18);
  transition: box-shadow var(--t), transform var(--t);
  user-select: none;
  position: relative;    /* contexto para pseudo-elemento */
  z-index: 3;
}

.profile-ava-big:hover {
  box-shadow: 0 4px 20px rgba(0,0,0,.28);
  transform: scale(1.04);
}

/* Overlay escuro com hint ao passar o mouse */
.profile-ava-big::after {
  content: '📷';
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,.45);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.4rem;
  opacity: 0;
  transition: opacity var(--t);
  border-radius: 50%;
}

.profile-ava-big:hover::after {
  opacity: 1;
}

/* A foto dentro do avatar preenche o círculo */
.profile-ava-big img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 50%;
}

/*
  BADGE DE EDIÇÃO (lápis)
  Círculo pequeno posicionado sobre o canto inferior
  direito do avatar, indicando que é editável.
*/
.ava-edit-badge {
  position: absolute;
  bottom: 3px;
  right: 3px;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: var(--accent);
  border: 2px solid var(--surface);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  pointer-events: none;    /* não interfere no clique do avatar */
  z-index: 4;
}


/* ══════════════════════════════════════════════
   INFORMAÇÕES DO PERFIL
══════════════════════════════════════════════ */

/* Linha: bloco de info + botão editar */
.profile-name-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;    /* em telas pequenas, o botão cai para baixo */
}

.profile-info {
  flex: 1;
  min-width: 0;
}

/* Nome do usuário */
.p-name {
  font-size: 1.35rem;
  font-weight: 800;
  letter-spacing: -.025em;
  line-height: 1.2;
}

/* Subtítulo (cargo/tipo) */
.p-role {
  font-size: .78rem;
  color: var(--ink-3);
  margin-top: 3px;
}

/* Bio do usuário */
.p-bio {
  font-family: var(--font-body);
  font-size: .9rem;
  color: var(--ink-2);
  line-height: 1.55;
  margin-top: 10px;
  max-width: 420px;
}


/* ══════════════════════════════════════════════
   ESTATÍSTICAS
   Grade de dois cards com número + label.
══════════════════════════════════════════════ */
.stats-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.stat-box {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--r-lg);
  padding: 20px 24px;
  box-shadow: var(--sh);
  display: flex;
  flex-direction: column;
  gap: 4px;
  transition: border-color var(--t), box-shadow var(--t);
}

.stat-box:hover {
  border-color: var(--border-2);
  box-shadow: var(--sh-lg);
}

/* Número grande em azul */
.stat-num {
  font-size: 2.1rem;
  font-weight: 800;
  letter-spacing: -.04em;
  color: var(--accent);
  line-height: 1;
}

/* Rótulo abaixo do número */
.stat-lbl {
  font-size: .76rem;
  color: var(--ink-3);
  font-weight: 500;
}


/* ══════════════════════════════════════════════
   CABEÇALHO DE SEÇÃO
   Linha com título e divisor horizontal.
   Ex: "Suas postagens ─────────────────────"
══════════════════════════════════════════ */
.section-head {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}

.section-title {
  font-size: .72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--ink-3);
  white-space: nowrap;
}

/* Linha que se expande para ocupar o espaço restante */
.section-divider {
  flex: 1;
  height: 1px;
  background: var(--border);
}
/*
 * ╔══════════════════════════════════════════════════════════════╗
 * ║  animations.css — Keyframes e Transições                    ║
 * ║                                                              ║
 * ║  Todas as animações do projeto ficam aqui.                  ║
 * ║  Usar animation-delay escalonado nos filhos cria um          ║
 * ║  efeito de "stagger" (cascata) agradável ao carregar.        ║
 * ╚══════════════════════════════════════════════════════════════╝
 */


/* ══════════════════════════════════════════════
   KEYFRAMES

   fadeUp     → entra de baixo para cima com fade (cards, painéis)
   fadeIn     → apenas fade de opacidade (overlays, backdrops)
   slideUp    → entra de baixo com scale e bounce (modais)
   shimmer    → loading skeleton effect (não usado agora, mas disponível)
══════════════════════════════════════════════ */

@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(14px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

/* Animação dos modais: elástica (cubic-bezier com overshoot) */
@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(20px) scale(.96);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

/* Shimmer para estados de carregamento */
@keyframes shimmer {
  from { background-position: -200% center; }
  to   { background-position:  200% center; }
}


/* ══════════════════════════════════════════════
   DELAY ESCALONADO DOS POST CARDS
   Cada card entra com um atraso progressivo,
   criando efeito de "stagger" na listagem inicial.
   Apenas os 8 primeiros são animados com stagger;
   os demais entram sem delay.
══════════════════════════════════════════════ */
.feed-list .post-card:nth-child(1)  { animation-delay:   0ms; }
.feed-list .post-card:nth-child(2)  { animation-delay:  50ms; }
.feed-list .post-card:nth-child(3)  { animation-delay: 100ms; }
.feed-list .post-card:nth-child(4)  { animation-delay: 150ms; }
.feed-list .post-card:nth-child(5)  { animation-delay: 180ms; }
.feed-list .post-card:nth-child(6)  { animation-delay: 210ms; }
.feed-list .post-card:nth-child(7)  { animation-delay: 230ms; }
.feed-list .post-card:nth-child(8)  { animation-delay: 250ms; }


/* ══════════════════════════════════════════════
   RESPEITO A preferências de acessibilidade
   Usuários que pedem "reduced motion" veem
   transições mínimas sem movimento.
══════════════════════════════════════════════ */
@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    animation-duration: .01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: .01ms !important;
    scroll-behavior: auto !important;
  }
}
</style>


<!--
  APP SHELL
  ─────────
  Contém três áreas distintas:
    1. .rail       – barra lateral de navegação (desktop)
    2. .center-col – coluna central com o conteúdo das abas
    3. .bottom-bar – barra inferior de navegação (mobile)
-->
<div class="app-shell">

  <!-- ══════════════════════════════════════
       RAIL — navegação lateral (desktop)
  ══════════════════════════════════════ -->
  <nav class="rail" id="rail" role="navigation" aria-label="Navegação principal">

    <div class="rail-logo" title="Daily Study">DS</div>

    <!-- Botão Feed -->
    <button
      class="rail-btn active"
      data-tab="feed"
      aria-label="Feed"
      aria-current="page"
    >
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span class="rail-tooltip">Feed</span>
    </button>

    <!-- Botão Perfil -->
    <button
      class="rail-btn"
      data-tab="profile"
      aria-label="Perfil"
    >
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span class="rail-tooltip">Perfil</span>
    </button>

  </nav>

       COLUNA CENTRAL — conteúdo das abas
  ══════════════════════════════════════ -->
  <main class="center-col" role="main">


    <!-- ─────────────────────────────────────
         ABA: FEED
         Compose box para criar posts
         + lista de posts em ordem cronológica
    ───────────────────────────────────────── -->
    <section
      class="tab-panel active"
      id="tab-feed"
      role="tabpanel"
    >

      <!-- Topo do feed: título + contador de posts -->
      <div class="feed-top">
        <h1 class="feed-title">Feed</h1>
        <span class="post-badge" id="postBadge" aria-live="polite">0 posts</span>
      </div>


      <!--
        COMPOSE BOX
        ────────────
        Área de criação de novo post.
        Contém avatar, textarea, upload de imagem,
        contador de caracteres e botão publicar.
        O botão "Publicar" fica desabilitado até haver texto.
        Atalho de teclado: Ctrl+Enter / Cmd+Enter.
      -->
      <div class="compose" id="compose">
        <div class="compose-row">

          <!-- Avatar (clique leva à aba de perfil) -->
          <div
            class="compose-ava"
            id="composeAva"
            role="button"
            tabindex="0"
            title="Ver perfil"
            aria-label="Seu avatar"

          <!-- Corpo do compose -->

            <!-- Textarea principal -->

              class="compose-ta"
              placeholder="O que você está estudando hoje?"
              maxlength="500"
              rows="3"

            <!--
              Pré-visualização da imagem selecionada

              Botão ✕ remove a imagem e limpa o input file.
            -->

              <img id="composePreviewImg" src="" alt="Prévia da imagem"/>

            <!-- Rodapé: ferramentas à esquerda | contador + publicar à direita -->

              <!-- Ferramenta de upload de imagem -->
              <div class="compose-tools">
                <!--
                  O <label> funciona como botão e aciona o <input file> oculto.
                  Aceita apenas imagens. O arquivo selecionado é convertido para
                  Base64 (Data URL) via FileReader e guardado no localStorage.
                -->
                <label
                  for="imgInput"
                  class="tool-btn img-tool-btn"
                  title="Anexar imagem ao post"
                  aria-label="Selecionar imagem"
                >
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                       stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                    <circle cx="8.5" cy="8.5" r="1.5"/>
                    <polyline points="21 15 16 10 5 21"/>

              </div>

              <!-- Contador + botão publicar -->
              <div class="compose-right">
                <span
                  class="char-counter"
                  id="charCount"
                  aria-live="polite"

                <button
                  class="btn-post"
                  id="btnPost"
                  disabled

                    <polygon points="22 2 15 22 11 13 2 9 22 2"/>

                aria-label="Foto de perfil. Clique para trocar."

                  <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/>
                </svg>

              <!-- Input file para o avatar (oculto) -->

                <div class="p-bio" id="pBio"></div>

          <div class="empty-state hidden" id="profileEmpty" role="status">
